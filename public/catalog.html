<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{SEO_TITLE}}</title>
    {{SEO_META}}
    <link rel="alternate" hreflang="ru-BY" href="{{HREFLANG_URL}}">
    <link rel="alternate" hreflang="x-default" href="{{HREFLANG_URL}}">
    <link rel="preload" href="/fonts/manrope-cyrillic.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/manrope-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/oswald-cyrillic.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/oswald-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    {{FONTS_CSS_INLINE}}
    <meta name="theme-color" content="#0a0a0a" id="meta-theme-color">
    {{CRITICAL_CSS_INLINE}}
    {{STYLE_CSS_DEFERRED}}
    <link rel="preconnect" href="https://telegram.org">
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    <script>
    (function(){
        var tg = window.Telegram && window.Telegram.WebApp;
        var isTg = !!window.TelegramWebviewProxy
            || (tg && tg.initData)
            || /Telegram|TgWebView/i.test(navigator.userAgent)
            || /tgWebApp/.test(window.location.hash);
        if (isTg) document.documentElement.classList.add('tg-browser');
    })();
    </script>

</head>
<body>

{{HEADER}}

<main id="main-content">

<!-- Breadcrumb (browser only, hidden in TG) -->
<nav class="catalog-breadcrumb browser-only-link" aria-label="Навигация">
    <a href="/">Главная</a>
    <span class="catalog-breadcrumb__sep" aria-hidden="true">
        <svg width="6" height="10" viewBox="0 0 6 10" fill="none"><path d="M1 1l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span>Каталог</span>
</nav>

<!-- Mobile toolbar: search + filters (hidden on desktop) -->
<search class="toolbar" id="toolbar">
    <div class="toolbar__row">
        <div class="toolbar__search">
            <svg class="toolbar__search-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="m17 17 4 4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            <label for="search-input" class="visually-hidden">Поиск по каталогу</label>
            <input type="text" class="toolbar__search-input" id="search-input" placeholder="Найти..." autocomplete="off">
        </div>
        <button class="toolbar__filter-btn" id="filter-toggle-btn" aria-expanded="false" aria-controls="filter-dropdown" aria-label="Фильтры">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
                <path d="M4 6h16M7 12h10M10 18h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="toolbar__filter-badge" id="filter-badge"></span>
        </button>
    </div>
    <div class="toolbar__dropdown" id="filter-dropdown">
        <div class="toolbar__dropdown-group">
            <label class="toolbar__dropdown-label">Категория</label>
            <div class="toolbar__heat-chips" id="category-chips" role="radiogroup" aria-label="Фильтр по категории">
                <button class="toolbar__chip active" data-category="all" role="radio" aria-checked="true">Все</button>
                {{CATEGORY_CHIPS}}
            </div>
        </div>
        <div class="toolbar__dropdown-group">
            <label class="toolbar__dropdown-label">Острота</label>
            <div class="toolbar__heat-chips" id="filter-chips" role="radiogroup" aria-label="Фильтр по остроте">
                <button class="toolbar__chip active" data-filter="all" role="radio" aria-checked="true">Все</button>
                <button class="toolbar__chip" data-filter="extreme" role="radio" aria-checked="false">Боль</button>
                <button class="toolbar__chip" data-filter="fire" role="radio" aria-checked="false">Сильная</button>
                <button class="toolbar__chip" data-filter="hot" role="radio" aria-checked="false">Средняя</button>
                <button class="toolbar__chip" data-filter="medium" role="radio" aria-checked="false">Умеренная</button>
                <button class="toolbar__chip" data-filter="mild" role="radio" aria-checked="false">Лёгкая</button>
            </div>
        </div>
        <div class="toolbar__dropdown-group">
            <label class="toolbar__dropdown-label">Наличие</label>
            <div class="toolbar__heat-chips" id="stock-toggle" role="radiogroup" aria-label="Фильтр по наличию">
                <button class="toolbar__chip active" data-stock="all" role="radio" aria-checked="true">Все</button>
                <button class="toolbar__chip toolbar__chip--stock-in" data-stock="in_stock" role="radio" aria-checked="false">В наличии</button>
                <button class="toolbar__chip toolbar__chip--stock-out" data-stock="out_of_stock" role="radio" aria-checked="false">Нет</button>
            </div>
        </div>
        <button class="toolbar__reset-btn" id="toolbar-reset-btn">Сбросить фильтры</button>
        <button type="button" class="toolbar__apply-btn" id="toolbar-apply-btn">Показать товары</button>
    </div>
    <div class="toolbar__hint" id="search-hint" aria-live="polite" aria-atomic="true"></div>
</search>

<!-- Catalog intro (visible to crawlers, hidden when JS filters active) -->
<!-- Catalog layout wrapper (sidebar + grid on desktop) -->
<div class="catalog-layout">

    <!-- Desktop filter sidebar (hidden on mobile) -->
    <aside class="catalog-sidebar" id="catalog-sidebar">
        <div class="catalog-sidebar__section">
            <h3 class="catalog-sidebar__title">Категория</h3>
            <div class="catalog-sidebar__options" id="sidebar-category" role="radiogroup" aria-label="Фильтр по категории">
                <button class="catalog-sidebar__option active" data-category="all" role="radio" aria-checked="true">
                    <span class="catalog-sidebar__radio"></span>
                    Все категории
                </button>
                {{CATEGORY_SIDEBAR}}
            </div>
        </div>
        <div class="catalog-sidebar__divider"></div>
        <div class="catalog-sidebar__section">
            <h3 class="catalog-sidebar__title">Уровень остроты</h3>
            <div class="catalog-sidebar__options" id="sidebar-heat" role="radiogroup" aria-label="Фильтр по остроте">
                <button class="catalog-sidebar__option active" data-filter="all" role="radio" aria-checked="true">
                    <span class="catalog-sidebar__radio"></span>
                    Все уровни
                </button>
                <button class="catalog-sidebar__option" data-filter="extreme" role="radio" aria-checked="false">
                    <span class="catalog-sidebar__radio"></span>
                    <span class="catalog-sidebar__dot catalog-sidebar__dot--extreme"></span>
                    Экстремальная
                </button>
                <button class="catalog-sidebar__option" data-filter="fire" role="radio" aria-checked="false">
                    <span class="catalog-sidebar__radio"></span>
                    <span class="catalog-sidebar__dot catalog-sidebar__dot--fire"></span>
                    Сильная
                </button>
                <button class="catalog-sidebar__option" data-filter="hot" role="radio" aria-checked="false">
                    <span class="catalog-sidebar__radio"></span>
                    <span class="catalog-sidebar__dot catalog-sidebar__dot--hot"></span>
                    Средняя
                </button>
                <button class="catalog-sidebar__option" data-filter="medium" role="radio" aria-checked="false">
                    <span class="catalog-sidebar__radio"></span>
                    <span class="catalog-sidebar__dot catalog-sidebar__dot--medium"></span>
                    Умеренная
                </button>
                <button class="catalog-sidebar__option" data-filter="mild" role="radio" aria-checked="false">
                    <span class="catalog-sidebar__radio"></span>
                    <span class="catalog-sidebar__dot catalog-sidebar__dot--mild"></span>
                    Лёгкая
                </button>
            </div>
        </div>
        <div class="catalog-sidebar__divider"></div>
        <div class="catalog-sidebar__section">
            <h3 class="catalog-sidebar__title">Наличие</h3>
            <div class="catalog-sidebar__options" id="sidebar-stock" role="radiogroup" aria-label="Фильтр по наличию">
                <button class="catalog-sidebar__option active" data-stock="all" role="radio" aria-checked="true">
                    <span class="catalog-sidebar__radio"></span>
                    Все товары
                </button>
                <button class="catalog-sidebar__option" data-stock="in_stock" role="radio" aria-checked="false">
                    <span class="catalog-sidebar__radio"></span>
                    <span class="catalog-sidebar__indicator catalog-sidebar__indicator--in"></span>
                    В наличии
                </button>
                <button class="catalog-sidebar__option" data-stock="out_of_stock" role="radio" aria-checked="false">
                    <span class="catalog-sidebar__radio"></span>
                    <span class="catalog-sidebar__indicator catalog-sidebar__indicator--out"></span>
                    Нет в наличии
                </button>
            </div>
        </div>
        <button class="catalog-sidebar__reset" id="sidebar-reset-btn">Сбросить все фильтры</button>
    </aside>

    <!-- Product grid -->
    <section class="catalog-section" aria-label="Товары">
        <div class="catalog-intro" id="catalog-intro">
            <h1 class="catalog-intro__title" id="catalog-heading">{{CATALOG_TITLE}}</h1>
            <p>{{CATALOG_INTRO}}</p>
        </div>
        <div class="catalog-section__topbar">
            <div class="catalog-section__results" id="desktop-results-count" aria-live="polite" aria-atomic="true"></div>
        </div>
        <div id="catalog" class="catalog" role="list" aria-labelledby="catalog-heading">{{SSR_PRODUCTS}}</div>
    </section>

</div>

{{SEO_JSONLD}}

</main>

<!-- Product detail modal -->
<div id="modal-overlay" class="modal-overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-name" aria-describedby="modal-description">
        <div class="modal__top-bar">
            <div class="modal__handle"></div>
            <button class="modal__close" id="modal-close-btn" aria-label="Закрыть">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="modal__layout">
            <div id="modal-image-container" class="modal__image-wrapper"></div>
            <div class="modal__content">
                <h2 id="modal-name" class="modal__name"></h2>
                <div id="modal-subtitle" class="modal__subtitle"></div>

                <div id="modal-stock" class="modal__stock-badge modal__stock-badge--in">В наличии</div>

                <div id="modal-peppers" class="modal__peppers">
                    <span class="modal__pepper-icons"></span>
                    <span class="modal__pepper-label"></span>
                </div>

                <div id="modal-description" class="modal__description collapsed"></div>
                <button id="modal-read-more" class="modal__read-more" aria-expanded="false" aria-controls="modal-description">Читать далее</button>

                <div id="modal-composition" class="modal__info-block" style="display:none">
                    <div class="modal__info-label">Состав</div>
                    <div id="modal-composition-value" class="modal__info-value"></div>
                </div>

                <div id="modal-volume" style="display:none">
                    <span id="modal-volume-value" class="modal__volume-pill"></span>
                </div>

                <button class="modal__contact-btn" id="modal-contact-btn">
                    Написать продавцу
                </button>
            </div>
        </div>
    </div>
</div>

{{FOOTER}}

<script src="/js/scroll-top.js?v={{V_SCROLL}}" defer></script>
<script src="/js/catalog.js?v={{V_CATALOG}}" defer></script>
<script>
(function(){
    var btn=document.getElementById('burger-btn'),nav=document.getElementById('main-nav');
    if(!btn||!nav)return;
    btn.addEventListener('click',function(){
        var open=nav.classList.toggle('open');
        btn.classList.toggle('open',open);
        btn.setAttribute('aria-expanded',String(open));
        document.body.classList.toggle('menu-open',open);
    });
    nav.querySelectorAll('a').forEach(function(a){
        a.addEventListener('click',function(){
            nav.classList.remove('open');
            btn.classList.remove('open');
            btn.setAttribute('aria-expanded','false');
            document.body.classList.remove('menu-open');
        });
    });
})();
</script>
</body>
</html>
